<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>断舍离 — 理性整理助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   Design Tokens
   ═══════════════════════════════════════════ */
:root {
  /* Warm earthy palette */
  --clay-50: #fdf8f4;
  --clay-100: #f9ede3;
  --clay-200: #f0d9c6;
  --clay-300: #e4bfa0;
  --clay-400: #d4a07a;
  --clay-500: #c4845e;
  --clay-600: #b06a42;
  --clay-700: #8f5535;

  /* Cool calm palette (冷静室) */
  --calm-50: #f0f7f7;
  --calm-100: #dceeed;
  --calm-200: #b8ddd9;
  --calm-300: #88c5bf;
  --calm-400: #5ba9a1;
  --calm-500: #3d8d85;
  --calm-600: #2d6e68;
  --calm-700: #23554f;

  /* Neutral */
  --sand-50: #faf9f7;
  --sand-100: #f3f1ed;
  --sand-200: #e8e4dc;
  --sand-300: #d5cfc4;
  --sand-400: #b8b0a2;
  --sand-500: #9a9080;
  --sand-600: #7a7060;
  --sand-700: #5c5446;
  --sand-800: #3d3730;
  --sand-900: #211e1a;

  /* Semantic */
  --rose-400: #e8868a;
  --rose-500: #d96069;
  --amber-400: #f0b954;
  --green-400: #72c080;
  --green-500: #4da85e;

  /* Typography */
  --font-body: 'Zen Maru Gothic', -apple-system, 'PingFang SC', sans-serif;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 999px;

  /* Shadows */
  --shadow-soft: 0 2px 16px rgba(143, 85, 53, 0.06);
  --shadow-medium: 0 4px 24px rgba(143, 85, 53, 0.10);
  --shadow-lift: 0 8px 32px rgba(143, 85, 53, 0.14);
  --shadow-calm: 0 4px 24px rgba(61, 141, 133, 0.10);
}

/* ═══════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--clay-50);
  color: var(--sand-800);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* Subtle texture background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(212,160,122,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(93,169,161,0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(240,217,198,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   App Container
   ═══════════════════════════════════════════ */
#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ═══════════════════════════════════════════
   Header
   ═══════════════════════════════════════════ */
.app-header {
  padding: var(--space-xl) var(--space-lg) var(--space-lg);
  text-align: center;
  position: relative;
}

.app-header h1 {
  font-family: var(--font-body);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--sand-900);
  letter-spacing: 2px;
  margin-bottom: var(--space-xs);
}

.app-header h1 span {
  display: inline-block;
  background: linear-gradient(135deg, var(--clay-500), var(--clay-600));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.app-header .subtitle {
  font-size: 0.85rem;
  color: var(--sand-500);
  font-weight: 400;
  letter-spacing: 1px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-md) var(--space-lg);
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }

.stat-chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-full);
  font-size: 0.8rem;
  font-weight: 500;
  background: white;
  box-shadow: var(--shadow-soft);
  transition: all 0.3s ease;
}
.stat-chip:hover { transform: translateY(-1px); box-shadow: var(--shadow-medium); }
.stat-chip .num { font-weight: 700; font-size: 0.95rem; }
.stat-chip.total { color: var(--clay-600); border: 1px solid var(--clay-200); }
.stat-chip.cooling { color: var(--calm-600); border: 1px solid var(--calm-200); }
.stat-chip.freed { color: var(--green-500); border: 1px solid #d4edda; }

/* ═══════════════════════════════════════════
   Tab Navigation
   ═══════════════════════════════════════════ */
.tab-nav {
  display: flex;
  gap: var(--space-xs);
  padding: 0 var(--space-lg);
  margin-bottom: var(--space-lg);
}

.tab-btn {
  flex: 1;
  padding: var(--space-sm) 6px;
  border: none;
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--sand-500);
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}

.tab-btn.active {
  background: white;
  color: var(--sand-800);
  box-shadow: var(--shadow-medium);
  font-weight: 700;
}

.tab-btn.calm-active {
  background: var(--calm-50);
  color: var(--calm-700);
  box-shadow: var(--shadow-calm);
  font-weight: 700;
}

.tab-btn .badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 0.7rem;
  font-weight: 700;
  margin-left: 4px;
  vertical-align: middle;
}

.tab-btn.active .badge { background: var(--clay-100); color: var(--clay-600); }
.tab-btn.calm-active .badge { background: var(--calm-100); color: var(--calm-600); }
.tab-btn:not(.active):not(.calm-active) .badge { background: var(--sand-200); color: var(--sand-600); }

/* ═══════════════════════════════════════════
   Content Panels
   ═══════════════════════════════════════════ */
.panel { display: none; padding: 0 var(--space-lg); }
.panel.active { display: block; animation: fadeSlideIn 0.4s ease; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   Item Cards
   ═══════════════════════════════════════════ */
.item-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  box-shadow: var(--shadow-soft);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}

.item-card:hover {
  box-shadow: var(--shadow-medium);
  transform: translateY(-2px);
}

.item-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  border-radius: 4px 0 0 4px;
}

.item-card.score-high::before { background: var(--rose-500); }
.item-card.score-mid::before { background: var(--amber-400); }
.item-card.score-low::before { background: var(--green-400); }

.item-card .card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--space-sm);
}

.item-card .item-name {
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--sand-900);
  flex: 1;
}

.item-card .category-tag {
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--clay-100);
  color: var(--clay-600);
  font-weight: 500;
  white-space: nowrap;
}

.item-card .verdict-box {
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin: var(--space-sm) 0;
  line-height: 1.6;
}

.verdict-low {
  background: linear-gradient(135deg, #f0faf2, #e8f5e9);
  border: 1px solid #c8e6c9;
}

.verdict-mid {
  background: linear-gradient(135deg, #fffcf0, #fff8e1);
  border: 1px solid #ffe0b2;
}

.verdict-high {
  background: linear-gradient(135deg, #fef5f5, #fde8e8);
  border: 1px solid #f5c6c6;
}

.verdict-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.verdict-icon {
  font-size: 0.85rem;
}

.verdict-label {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--sand-900);
}

.verdict-desc {
  font-size: 0.82rem;
  color: var(--sand-600);
  margin-bottom: 6px;
}

.verdict-tip {
  font-size: 0.78rem;
  color: var(--sand-500);
  padding-top: 6px;
  border-top: 1px dashed rgba(0,0,0,0.06);
}

.item-card .card-meta {
  display: flex;
  gap: var(--space-md);
  font-size: 0.75rem;
  color: var(--sand-500);
  margin-top: var(--space-sm);
  padding-top: var(--space-sm);
  border-top: 1px solid var(--sand-100);
}

.card-meta span { display: flex; align-items: center; gap: 3px; }

.item-card .card-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.btn-action {
  flex: 1;
  padding: var(--space-sm) var(--space-md);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.btn-action:active { transform: scale(0.96); }

.btn-cool {
  background: var(--calm-50);
  color: var(--calm-600);
  border: 1px solid var(--calm-200);
}
.btn-cool:hover { background: var(--calm-100); box-shadow: var(--shadow-calm); }

.btn-dispose {
  background: var(--clay-50);
  color: var(--clay-600);
  border: 1px solid var(--clay-200);
}
.btn-dispose:hover { background: var(--clay-100); }

.btn-keep {
  background: var(--sand-100);
  color: var(--sand-600);
  border: 1px solid var(--sand-200);
}
.btn-keep:hover { background: var(--sand-200); }

/* ═══════════════════════════════════════════
   Cooling Room Cards
   ═══════════════════════════════════════════ */
.cooling-card {
  background: linear-gradient(135deg, var(--calm-50), white);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  box-shadow: var(--shadow-calm);
  border: 1px solid var(--calm-200);
  position: relative;
  overflow: hidden;
  transition: all 0.35s ease;
}

.cooling-card:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(61,141,133,0.14); }

.cooling-card .frost-overlay {
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle at top right, rgba(184,221,217,0.4), transparent 70%);
  pointer-events: none;
}

.cooling-card .card-top { display: flex; justify-content: space-between; align-items: flex-start; }

.cooling-card .item-name {
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--calm-700);
}

.cooling-timer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: 0.75rem;
  font-weight: 600;
}

.timer-active {
  background: var(--calm-100);
  color: var(--calm-600);
}

.timer-expired {
  background: #fff0f0;
  color: var(--rose-500);
  animation: gentlePulse 2s ease-in-out infinite;
}

@keyframes gentlePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.cooling-card .cool-progress {
  margin: var(--space-md) 0 var(--space-sm);
}

.progress-bar-bg {
  height: 6px;
  background: var(--calm-100);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--calm-400), var(--calm-500));
  transition: width 0.6s ease;
}

.progress-bar-fill.expired {
  background: linear-gradient(90deg, var(--rose-400), var(--rose-500));
}

.cool-date-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--sand-500);
  margin-top: var(--space-xs);
}

.cooling-card .expired-msg {
  margin-top: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  background: #fff8f0;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--amber-400);
  font-size: 0.82rem;
  color: var(--sand-700);
  line-height: 1.5;
}

.cooling-card .card-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* ═══════════════════════════════════════════
   History / Freed
   ═══════════════════════════════════════════ */
.freed-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: var(--space-md) var(--space-lg);
  margin-bottom: var(--space-sm);
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  gap: var(--space-md);
  opacity: 0.85;
  transition: all 0.3s ease;
}

.freed-card:hover { opacity: 1; }

.freed-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.freed-icon.trash { background: #fde8e8; }
.freed-icon.gift { background: #e8f5e9; }
.freed-icon.sell { background: #fff3e0; }
.freed-icon.donate { background: #e3f2fd; }

.freed-info { flex: 1; }
.freed-info .name { font-weight: 600; font-size: 0.9rem; color: var(--sand-800); }
.freed-info .detail { font-size: 0.75rem; color: var(--sand-500); margin-top: 2px; }

.freed-card .freed-date {
  font-size: 0.72rem;
  color: var(--sand-400);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   Add Button (FAB)
   ═══════════════════════════════════════════ */
.fab {
  position: fixed;
  bottom: 28px;
  right: calc(50% - 220px);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--clay-500), var(--clay-600));
  color: white;
  font-size: 1.5rem;
  box-shadow: 0 6px 24px rgba(176, 106, 66, 0.35);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fab:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 8px 32px rgba(176, 106, 66, 0.45); }
.fab:active { transform: scale(0.95); }

@media (max-width: 520px) {
  .fab { right: 20px; }
}

/* ═══════════════════════════════════════════
   Modal / Overlay
   ═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(33,30,26,0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal-sheet {
  background: white;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  padding: var(--space-lg) var(--space-lg) var(--space-2xl);
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.show .modal-sheet { transform: translateY(0); }

.modal-sheet .handle {
  width: 36px;
  height: 4px;
  background: var(--sand-300);
  border-radius: 2px;
  margin: 0 auto var(--space-lg);
}

.modal-sheet h2 {
  font-family: var(--font-body);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--sand-900);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* Form fields */
.form-group {
  margin-bottom: var(--space-lg);
}

.form-group label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--sand-700);
  margin-bottom: var(--space-sm);
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 1.5px solid var(--sand-200);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--sand-800);
  background: var(--sand-50);
  transition: all 0.3s ease;
  outline: none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--clay-400);
  box-shadow: 0 0 0 3px rgba(196,132,94,0.1);
  background: white;
}

.form-group textarea { resize: vertical; min-height: 70px; }

/* Step indicator */
.step-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: var(--space-lg);
}

.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--sand-200);
  transition: all 0.3s ease;
}

.step-dot.active { background: var(--clay-500); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--green-400); }

/* Steps */
.add-step { display: none; }
.add-step.active { display: block; animation: fadeSlideIn 0.3s ease; }

/* Chip select (replaces dropdowns and inputs) */
.chip-select {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip-btn {
  padding: 7px 14px;
  border: 1.5px solid var(--sand-200);
  border-radius: var(--radius-full);
  background: white;
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--sand-600);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
}

.chip-btn:hover { border-color: var(--clay-300); color: var(--clay-600); background: var(--clay-50); }

.chip-btn.selected {
  background: var(--clay-500);
  border-color: var(--clay-500);
  color: white;
  box-shadow: 0 2px 8px rgba(196,132,94,0.25);
}

/* Back button */
.btn-back {
  display: block;
  width: 100%;
  padding: var(--space-md);
  border: none;
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--sand-500);
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: var(--space-sm);
}

.btn-back:hover { color: var(--sand-700); background: var(--sand-50); }

/* Question cards in evaluation */
.eval-question {
  background: var(--sand-50);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-md);
}

.eval-question .q-text {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--sand-800);
  margin-bottom: var(--space-sm);
  line-height: 1.5;
}

.option-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.option-btn {
  padding: 7px 16px;
  border: 1.5px solid var(--sand-200);
  border-radius: var(--radius-full);
  background: white;
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--sand-600);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.option-btn:hover { border-color: var(--clay-300); color: var(--clay-600); }

.option-btn.selected {
  background: var(--clay-500);
  border-color: var(--clay-500);
  color: white;
  box-shadow: 0 2px 8px rgba(196,132,94,0.25);
}

/* Big submit button */
.btn-primary {
  display: block;
  width: 100%;
  padding: var(--space-md);
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--clay-500), var(--clay-600));
  color: white;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  margin-top: var(--space-lg);
}

.btn-primary:hover { box-shadow: var(--shadow-lift); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-secondary {
  display: block;
  width: 100%;
  padding: var(--space-md);
  border: 1.5px solid var(--sand-200);
  border-radius: var(--radius-md);
  background: white;
  color: var(--sand-700);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: var(--space-sm);
}

.btn-secondary:hover { background: var(--sand-50); border-color: var(--sand-300); }

/* ═══════════════════════════════════════════
   Dispose Modal
   ═══════════════════════════════════════════ */
.dispose-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
  margin: var(--space-lg) 0;
}

.dispose-opt {
  padding: var(--space-md);
  border: 2px solid var(--sand-200);
  border-radius: var(--radius-md);
  background: white;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
}

.dispose-opt:hover { border-color: var(--clay-300); transform: translateY(-2px); box-shadow: var(--shadow-soft); }
.dispose-opt.selected { border-color: var(--clay-500); background: var(--clay-50); }

.dispose-opt .opt-icon { font-size: 1.5rem; margin-bottom: var(--space-xs); }
.dispose-opt .opt-label { font-size: 0.85rem; font-weight: 600; color: var(--sand-800); }
.dispose-opt .opt-desc { font-size: 0.72rem; color: var(--sand-500); margin-top: 2px; }

/* Comfort message */
.comfort-zone {
  background: linear-gradient(135deg, #fef9f3, #fdf5ec);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin: var(--space-lg) 0;
  text-align: center;
  border: 1px solid var(--clay-200);
}

.comfort-zone .comfort-icon { font-size: 2rem; margin-bottom: var(--space-sm); }

.comfort-zone .comfort-text {
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.7;
  color: var(--clay-700);
}

.comfort-zone .comfort-sub {
  font-size: 0.78rem;
  color: var(--sand-500);
  margin-top: var(--space-sm);
}

/* Cool period selector */
.cool-period-selector {
  display: flex;
  gap: var(--space-sm);
  margin: var(--space-md) 0;
}

.period-btn {
  flex: 1;
  padding: var(--space-sm) var(--space-md);
  border: 1.5px solid var(--calm-200);
  border-radius: var(--radius-md);
  background: white;
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--calm-600);
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: center;
}

.period-btn:hover { background: var(--calm-50); }
.period-btn.selected { background: var(--calm-500); color: white; border-color: var(--calm-500); }

/* ═══════════════════════════════════════════
   Category Manager
   ═══════════════════════════════════════════ */
.category-chips {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.cat-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: var(--radius-full);
  background: var(--clay-100);
  color: var(--clay-700);
  font-size: 0.78rem;
  font-weight: 500;
}

.cat-chip .remove-cat {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: none;
  background: var(--clay-300);
  color: white;
  font-size: 0.65rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.cat-chip .remove-cat:hover { background: var(--rose-400); }

.add-cat-row {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.add-cat-row input {
  flex: 1;
  padding: 6px 12px;
  border: 1.5px solid var(--sand-200);
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-size: 0.82rem;
  outline: none;
}

.add-cat-row input:focus { border-color: var(--clay-400); }

.add-cat-btn {
  padding: 6px 16px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--clay-500);
  color: white;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.add-cat-btn:hover { background: var(--clay-600); }

/* ═══════════════════════════════════════════
   Empty States
   ═══════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: var(--space-2xl) var(--space-lg);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: var(--space-md);
  opacity: 0.5;
}

.empty-state .empty-title {
  font-family: var(--font-body);
  font-size: 1.1rem;
  color: var(--sand-700);
  margin-bottom: var(--space-sm);
}

.empty-state .empty-desc {
  font-size: 0.85rem;
  color: var(--sand-500);
  line-height: 1.6;
}

/* ═══════════════════════════════════════════
   Celebration Animation
   ═══════════════════════════════════════════ */
.celebration {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 300;
}

.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: confettiFall 1.5s ease-out forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ═══════════════════════════════════════════
   Settings Section
   ═══════════════════════════════════════════ */
.settings-section {
  background: white;
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  box-shadow: var(--shadow-soft);
}

.settings-section h3 {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 600;
  color: var(--sand-800);
  margin-bottom: var(--space-md);
}

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-sm) 0;
}

.setting-row + .setting-row { border-top: 1px solid var(--sand-100); }

.setting-label {
  font-size: 0.85rem;
  color: var(--sand-700);
}

.setting-value {
  font-size: 0.85rem;
  color: var(--sand-500);
}

.btn-danger {
  padding: var(--space-sm) var(--space-md);
  border: 1.5px solid var(--rose-400);
  border-radius: var(--radius-md);
  background: white;
  color: var(--rose-500);
  font-family: var(--font-body);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-danger:hover { background: #fef0f0; }

/* ═══════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════ */
@media (max-width: 480px) {
  #app { padding-bottom: 90px; }
  .app-header h1 { font-size: 1.5rem; }
  .modal-sheet { padding: var(--space-md) var(--space-md) var(--space-2xl); }
}
</style>
</head>

<div id="app">
  <!-- Header -->
  <header class="app-header">

  <!-- Stats -->

    </button>

  <!-- Panel: Items -->
  <div class="panel active" id="panelItems"></div>

  <!-- Panel: Cooling Room -->
  <div class="panel" id="panelCooling"></div>

  <!-- Panel: Freed -->
  <div class="panel" id="panelFreed"></div>

  <!-- Panel: Kept -->
  <div class="panel" id="panelKept"></div>

  <!-- Panel: Settings -->
  <div class="panel" id="panelSettings"></div>

</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="modalAdd">
  <div class="modal-sheet">
    <div class="handle"></div>
    <h2 id="addModalTitle">添加物品</h2>

    <!-- Step indicator -->
    <div class="step-indicator" id="stepIndicator">
      <div class="step-dot active" data-step="0"></div>
      <div class="step-dot" data-step="1"></div>
      <div class="step-dot" data-step="2"></div>
    </div>

    <!-- Step 0: Name + Category + Basic Info -->
    <div class="add-step active" id="addStep0">
      <div class="form-group">
        <label>这是什么东西？</label>
        <input type="text" id="inputName" placeholder="输入名称，比如：去年的羽绒服" autofocus>
      </div>

      <div class="form-group">
        <label>它属于哪一类？</label>
        <div class="chip-select" id="categoryChips"></div>
      </div>

      <div class="form-group">
        <label>大概花了多少钱？</label>
        <div class="chip-select" data-field="price">
          <button class="chip-btn" data-val="0">忘了/没花钱</button>
          <button class="chip-btn" data-val="50">50以内</button>
          <button class="chip-btn" data-val="100">50-200</button>
          <button class="chip-btn" data-val="500">200-500</button>
          <button class="chip-btn" data-val="1000">500-1k</button>
          <button class="chip-btn" data-val="3000">1k-5k</button>
          <button class="chip-btn" data-val="7500">5k-1w</button>
          <button class="chip-btn" data-val="10000">1w+</button>
        </div>
      </div>

      <div class="form-group">
        <label>上次用它是什么时候？</label>
        <div class="chip-select" data-field="lastUsed">
          <button class="chip-btn" data-val="week">最近一周</button>
          <button class="chip-btn" data-val="month">一个月内</button>
          <button class="chip-btn" data-val="3months">1-3个月</button>
          <button class="chip-btn" data-val="halfyear">3-6个月</button>
          <button class="chip-btn" data-val="year">半年-一年</button>
          <button class="chip-btn" data-val="over1year">超过一年</button>

      <div class="form-group">
        <label>它现在新旧程度如何？</label>
        <div class="chip-select" data-field="condition">
          <button class="chip-btn" data-val="new">全新/几乎没用过</button>
          <button class="chip-btn" data-val="good">八九成新</button>
          <button class="chip-btn" data-val="fair">正常使用痕迹</button>
          <button class="chip-btn" data-val="worn">比较旧了</button>
          <button class="chip-btn" data-val="bad">很旧/有损坏</button>
        </div>
      </div>

      <button class="btn-primary" id="btnNextStep1">下一步：快速评估</button>
      <button class="btn-secondary" id="btnCancelAdd">取消</button>
    </div>

    <!-- Step 1: Quick Evaluation (first 3 questions) -->
    <div class="add-step" id="addStep1">
      <div class="eval-question" id="qUsage">
        <div class="q-text">半年里用过几次？</div>
        <div class="option-group" data-q="usage">
          <button class="option-btn" data-val="0">0次</button>
          <button class="option-btn" data-val="1">1-2次</button>

      <div class="eval-question">

          <button class="option-btn" data-val="2">有点占</button>
          <button class="option-btn" data-val="1">还好</button>
          <button class="option-btn" data-val="0">不占</button>
        </div>
      </div>

      <button class="btn-primary" id="btnNextStep2">下一步</button>
      <button class="btn-back" id="btnBackStep0">上一步</button>
    </div>

    <!-- Step 2: Quick Evaluation (last 3 questions) -->
    <div class="add-step" id="addStep2">
      <div class="eval-question">
        <div class="q-text">用起来体验好吗？</div>
        <div class="option-group" data-q="experience">
          <button class="option-btn" data-val="0">很差</button>
          <button class="option-btn" data-val="1">凑合</button>
          <button class="option-btn" data-val="2">还不错</button>

          <button class="option-btn" data-val="1">不太会</button>
          <button class="option-btn" data-val="0">不要</button>

      </div>

      <button class="btn-primary" id="btnSubmitItem">完成，看结果</button>
      <button class="btn-back" id="btnBackStep1">上一步</button>
    </div>
  </div>
</div>

<!-- Dispose Modal -->
<div class="modal-overlay" id="modalDispose">

<script>
/* ═══════════════════════════════════════════
   断舍离 App - Core Logic v2
   ═══════════════════════════════════════════ */

// ─── Data Store ───
const STORAGE_KEY = 'declutter_app_data';

const DEFAULT_CATEGORIES = ['衣物', '鞋包', '电子产品', '日用品', '书籍', '厨房用品', '护肤美妆', '运动装备', '装饰摆件', '其他'];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { items: [], cooling: [], freed: [], kept: [], categories: [...DEFAULT_CATEGORIES] };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

let appData = loadData();
if (!appData.kept) appData.kept = [];

// ─── Comfort Messages ───
const COMFORT_MESSAGES = {
  trash: [
    { text: '它已经完成了自己的使命，谢谢它曾经陪伴你的日子。', sub: '每一件物品离开，都是在给新的可能腾出空间' },

    { text: '少即是多。每扔掉一件不用的东西，你的生活就轻盈了一分。', sub: '空间的余裕，也是心灵的余裕' },
    { text: '你值得被真正合适的东西环绕，而不是被将就的东西包围。', sub: '腾出的空间会迎来更好的' },
    { text: '今天的你做了一个勇敢的决定。勇敢的人值得更清爽的生活。', sub: '断舍离不是浪费，是对生活的尊重' },
  ],
  gift: [
    { text: '它在你这里的旅程结束了，但在别人那里还能继续发光。', sub: '赠人物品，也传递了温暖' },
    { text: '好东西就是要被用起来，送给需要的人是最好的归宿。', sub: '闲置才是真正的浪费' },
    { text: '它带着你的善意去了新家，这比放在角落里有意义多了。', sub: '分享是一种优雅的告别' },
  ],

// ─── Score Calculation ───
function calcScore(answers, condition) {
  // Each answer is 0-3. We compute a "should keep" score 0-100
  // High = should keep, Low = should dispose
  const usage = answers.usage ?? 0;
  const rebuy = answers.rebuy ?? 0;
  const space = answers.space ?? 0;     // high = takes space = reason to dispose
  const experience = answers.experience ?? 0;
  const emotion = answers.emotion ?? 0; // 0=wouldn't pack, 3=definitely pack
  const wannew = answers.wannew ?? 0;   // high = would want new = reason to keep

  // Condition bonus: new items have more residual value
  // new=2, good=1.5, fair=0.5, worn=-0.5, bad=-1.5
  const conditionMap = { 'new': 2, 'good': 1.5, 'fair': 0.5, 'worn': -0.5, 'bad': -1.5 };
  const conditionFactor = conditionMap[condition] ?? 0;

  // "Keep score" - how much reason to keep it
  const keepFactors = (usage * 2) + (rebuy * 1.5) + (experience * 1.5) + (emotion * 1) + (wannew * 1.5) + conditionFactor;
  const disposeFactors = space * 2.5;

  const maxKeep = (3*2) + (3*1.5) + (3*1.5) + (3*1) + (3*1.5) + 2; // 27.5
  const maxDispose = 3*2.5; // 7.5

  // Normalize to 0-100 where 100 = definitely keep
  const raw = ((keepFactors - disposeFactors) / (maxKeep + maxDispose)) * 100 + 50;
  return Math.max(0, Math.min(100, Math.round(raw)));
}

function getVerdict(score, item) {
  // Build specific, actionable advice based on score + item context
  const price = item?.price || 0;
  const condition = item?.condition || 'fair';
  const lastUsed = item?.lastUsed || '3months';

  if (score >= 75) {
    return {
      level: 'low',
      label: '留着它',
      action: '保留',
      desc: '你还在用，体验也不错，留着是对的。',
      tip: '下次再评估看看情况有没有变化。'
    };
  }

  if (score >= 50) {
    let tip = '放进冷静室观察一段时间，到期没用就可以放心处理。';
    if (lastUsed === 'year' || lastUsed === 'over1year') {
      tip = '虽然有些纠结，但你已经很久没用了。建议放冷静室 3 个月，到期没想起来就说明真不需要。';
    }
    return {
      level: 'mid',
      label: '先冷静一下',
      action: '放入冷静室',
      desc: '有点纠结，先放一放，时间会帮你做决定。',
      tip
    };
  }

  if (score >= 30) {
    let method = '';
    if (price >= 1000 && (condition === 'new' || condition === 'good')) {
      method = '品相不错，建议挂二手平台卖掉，还能回点血。';
    } else if (condition === 'new' || condition === 'good') {
      method = '东西还挺新的，送给朋友或捐出去都不错。';
    } else if (price >= 500) {
      method = '试试挂闲鱼看看能不能出，卖不掉就直接处理。';
    } else {
      method = '直接处理掉就好，别让它继续占空间了。';
    }
    return {
      level: 'high',
      label: '可以处理了',
      action: '处理掉',
      desc: '留着它的意义不大了。',
      tip: method
    };
  }

  // score < 30
  let method = '';
  if (condition === 'bad' || condition === 'worn') {
    method = '东西也旧了，直接扔掉最省心。';
  } else if (price >= 1000 && (condition === 'new' || condition === 'good')) {
    method = '虽然不需要了，但品相还行，建议卖掉回血。';
  } else if (condition === 'new' || condition === 'good') {
    method = '送人或捐赠都是好选择，让它去有缘人那里。';
  } else {
    method = '别纠结了，直接处理掉，轻装上阵。';
  }
  return {
    level: 'high',
    label: '建议尽快处理',
    action: '处理掉',
    desc: '它已经完成使命了，别让它继续占着你的空间。',
    tip: method
  };
}

  const now = Date.now();
  panel.innerHTML = appData.cooling.map((item, i) => {

function showStep(step) {
  currentStep = step;
  document.querySelectorAll('.add-step').forEach(s => s.classList.remove('active'));
  document.getElementById(`addStep${step}`).classList.add('active');
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    if (i < step) dot.classList.add('done');
    if (i === step) dot.classList.add('active');
  });
  const titles = ['添加物品', '快速评估 (1/2)', '快速评估 (2/2)'];
  document.getElementById('addModalTitle').textContent = titles[step];
}

  document.querySelector('.period-btn[data-days="120"]').classList.add('selected');
  openModal('modalCool');
}

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

document.getElementById('btnConfirmCool').addEventListener('click', () => {
  if (coolTargetIndex < 0) return;
  const days = parseInt(document.querySelector('.period-btn.selected')?.dataset.days || 120);
  const item = appData.items.splice(coolTargetIndex, 1)[0];

  item.coolStart = Date.now();
  item.coolUntil = Date.now() + days * 86400000;
  appData.cooling.push(item);
  saveData();
  closeModal('modalCool');
  render();
  coolTargetIndex = -1;
});

document.getElementById('btnCancelCool').addEventListener('click', () => {
  closeModal('modalCool');
  coolTargetIndex = -1;
});

function retrieveFromCooling(index) {
  const item = appData.cooling.splice(index, 1)[0];
  delete item.coolStart;
  delete item.coolUntil;
  appData.items.push(item);
  saveData();
  render();
}

function checkExpiredCooling() {
  // Auto-check and notify - mark expired items
  // (rendering handles visual differences)
}

// ─── Dispose Flow ───
let disposeTarget = { index: -1, source: 'items' };
let selectedMethod = '';

function openDisposeModal(index, source) {
  disposeTarget = { index, source };
  const list = source === 'items' ? appData.items : appData.cooling;
  const item = list[index];
  document.getElementById('disposeName').textContent = item.name;

  // Reset
  selectedMethod = '';
  document.querySelectorAll('.dispose-opt').forEach(o => o.classList.remove('selected'));
  document.getElementById('comfortZone').style.display = 'none';
  document.getElementById('btnConfirmDispose').disabled = true;

  openModal('modalDispose');
}

document.querySelectorAll('.dispose-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.dispose-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedMethod = opt.dataset.method;
    document.getElementById('btnConfirmDispose').disabled = false;

    // Show comfort message
    const msgs = COMFORT_MESSAGES[selectedMethod] || COMFORT_MESSAGES.trash;
    const msg = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('comfortText').textContent = msg.text;
    document.getElementById('comfortSub').textContent = msg.sub;
    document.getElementById('comfortZone').style.display = 'block';
  });
});

document.getElementById('btnConfirmDispose').addEventListener('click', () => {
  const { index, source } = disposeTarget;
  const list = source === 'items' ? appData.items : appData.cooling;
  const item = list.splice(index, 1)[0];

  appData.freed.push({
    id: item.id,
    name: item.name,
    category: item.category,
    price: item.price,
    method: selectedMethod,
    freedAt: Date.now()
  });

  saveData();
  closeModal('modalDispose');
  render();
  showCelebration();
});

document.getElementById('btnCancelDispose').addEventListener('click', () => closeModal('modalDispose'));

// ─── Keep / Remove ───
function removeItem(index) {
  const item = appData.items.splice(index, 1)[0];
  item.keptAt = Date.now();
  appData.kept.push(item);
  saveData();
  render();
}

// ─── Category Management ───
function addCategory() {
  const input = document.getElementById('newCatInput');
  const name = input.value.trim();
  if (!name) return;
  if (appData.categories.includes(name)) { alert('该分类已存在'); return; }
  appData.categories.push(name);
  saveData();
  input.value = '';
  render();
}

function removeCategory(index) {
  if (appData.categories.length <= 1) { alert('至少保留一个分类'); return; }
  appData.categories.splice(index, 1);
  saveData();
  render();
}

// ─── Celebration Effect ───
function showCelebration() {
  const container = document.getElementById('celebration');
  const colors = ['#c4845e', '#5ba9a1', '#f0b954', '#72c080', '#e8868a', '#88c5bf'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.5 + 's';
    el.style.animationDuration = (1 + Math.random()) + 's';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 2500);
}

// ─── Data Mgmt ───
function clearAllData() {
  if (confirm('确定要清除所有数据吗？此操作不可撤销。')) {
    appData = { items: [], cooling: [], freed: [], kept: [], categories: [...DEFAULT_CATEGORIES] };
    saveData();
    render();
  }
}

// ─── Helpers ───
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function lastUsedLabel(val) {
  const map = {
    week: '最近一周', month: '最近一个月', '3months': '1-3个月前',
    halfyear: '3-6个月前', year: '半年-一年前', over1year: '超过一年'
  };
  return map[val] || val;
}

function conditionLabel(val) {
  const map = {
    'new': '全新', 'good': '八九成新', 'fair': '有使用痕迹',
    'worn': '比较旧', 'bad': '很旧/损坏'
  };
  return map[val] || val;
}

// ─── Init ───
render();
</script>
